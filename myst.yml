# MyST configuration for Jupyter Book
version: 1

project:
  title: SustainOSS Academic Ecosystem Map
  authors:
    - name: SustainOSS Academic Working Group
  # Configuration files should be auto-detected from _config.yml and _toc.yml

# Exclude non-content directories and files
exclude:
  - _build/**
  - node_modules/**
  - .git/**
  - .github/**
  - scripts/**
  - README.md
  - CODE_OF_CONDUCT.md
  - contributing.md
  - LICENSE
  - package.json
  - package-lock.json
  - requirements.txt
  - "*.sh"
  - "*.js"
  - "*.json"
  - ".*"
